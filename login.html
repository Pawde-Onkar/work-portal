<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <link
        rel="stylesheet"
        href="login.css"
    >
    <link
href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="login-container">

    <h1>
        Talathi Work Portal
    </h1>

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <div class="button-group">

        <button id="talathiLoginBtn">
            Talathi Login
        </button>

        <button id="adminLoginBtn">
            Admin Login
        </button>

    </div>

    <p>

        Don't have an account?

        <a href="signup.html">
            Create Account
        </a>

    </p>

</div>

<script
    type="module"
    src="login.js"
></script>

</body>

</html>

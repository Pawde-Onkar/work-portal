<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Field Visit</title>

<link rel="stylesheet" href="field-visit.css">
<link
href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
rel="stylesheet">
</head>
<body>
    <nav class="navbar">

    <div class="logo">
        तलाठी कार्य पोर्टल
    </div>

    <ul class="navbar-links">

        <li>
            <a href="gpt.html" id="navbar-home">
                🏠 मुख्यपृष्ठ
            </a>
        </li>

        <li>
            <a href="field-visit-manager.html" id="navbar-visit">
                📋 क्षेत्र भेट
            </a>
        </li>

       

        <li>
            <a href="account.html" id="navbar-account">
                👤 माझे खाते
            </a>
        </li>

        <li>
            <a href="#" id="navbar-logout">
                🚪 बाहेर पडा
            </a>
        </li>

    </ul>

</nav>

<header>

    <h1>नवीन क्षेत्र भेट</h1>

    <a href="field-visit-manager.html" class="nav-btn">
        मागे
    </a>

</header>

<div class="container">

    <form id="fieldVisitForm">

        <div class="form-group">

            <label>
शेतकऱ्याचे नाव
</label>

            <input
                type="text"
                id="farmerName"
                required
            >

        </div>

        <div class="form-group">

            <label>गाव
</label>

            <input
                type="text"
                id="village"
                required
            >

        </div>

        <div class="form-group">

            <label>भेट दिनांक</label>

            <input
                type="date"
                id="visitDate"
                required
            >

        </div>

        <div class="form-group">

            <label>भेटीचा प्रकार</label>

            <select id="visitType" required>

                <option value="">
                    Select Type
                </option>

                <option value="Field Inspection">
                    Field Inspection
                </option>

                <option value="Verification">
                    Verification
                </option>

                <option value="Follow Up">
                    Follow Up
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Observation</label>

            <textarea
                id="observation"
                rows="4"
                
            ></textarea>

        </div>

        <div class="form-group">

            <label>Analysis</label>

            <textarea
                id="analysis"
                rows="4"
                
            ></textarea>

        </div>

        <div class="form-group">

            <label>Recommendation</label>

            <textarea
                id="recommendation"
                rows="4"
                
            ></textarea>

        </div>

        <div class="form-group">

        <label>Upload Photos</label>

       <input
            type="file"
            id="visitPhotos"
            accept="image/jpeg,image/jpg,image/png"
            multiple
        >
        <p class="upload-note">
    फोटो आपोआप संकुचित (compress) केले जातील.
</p>

        </div>
        <div class="form-group">

    <label>Upload Documents</label>

    <input
         type="file"
        id="visitDocuments"
        accept=".pdf,.doc,.docx"
        multiple
    >

</div>
    <div id="uploadLoader" class="loader-container">
    <div class="loader"></div>
    <p>Uploading Field Visit...</p>
</div>
        <button type="submit">

            सेव्ह भेट

        </button>

    </form>

</div>

<script type="module" src="field-visit.js"></script>
</body>
</html>
